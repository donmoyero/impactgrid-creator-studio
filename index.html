<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>DIJO CREW — Live AI Acting Crew</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="wrap">

    <!-- HEADER -->
    <div class="hdr">
      <div class="brand">DIJO <span>CREW</span></div>
      <div class="live-pill"><span class="ldot"></span>LIVE</div>
    </div>

    <!-- STAGE -->
    <div class="stage" id="stage">
      <div class="stage-bg" id="stage-bg"></div>
      <div class="stage-overlay"></div>
      <div class="stage-grid"></div>
      <div class="floor"></div>
      <div class="spot" id="spot" style="left:30%"></div>
      <div class="room-label" id="room-label">CONTENT STUDIO</div>

      <!-- Camera Rig -->
      <div class="cam">
        <div class="cb"><div class="cr"></div><div class="cl"></div></div>
        <div class="cleg cl1"></div>
        <div class="cleg cl2"></div>
        <div class="cleg cl3"></div>
      </div>

      <!-- Mic Stand -->
      <div class="mic">
        <div class="mh"></div>
        <div class="ma"></div>
        <div class="mb2"></div>
      </div>

      <!-- Laptop -->
      <div class="lap">
        <div class="ls">
          <div class="ll"></div>
          <div class="ll short"></div>
          <div class="ll"></div>
          <div class="ll short"></div>
        </div>
        <div class="lb"></div>
        <div class="lp"></div>
      </div>

      <!-- Green Screen -->
      <div class="gs"><div class="gsl">GREEN SCREEN</div></div>

      <!-- Agent Avatar -->
      <div class="avatar-wrap" id="avatar-wrap">
        <img class="avatar-img" id="avatar-img" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" alt="Agent"/>
        <div class="avatar-name" id="avatar-name">DIJO CREW</div>
        <div class="avatar-role" id="avatar-role">Ready to perform</div>
      </div>

      <!-- Speech Bubble -->
      <div class="speech-bub" id="speech-bub"></div>

      <!-- Voice Indicator -->
      <div class="voice-ind" id="voice-ind">
        <span class="vi-dot"></span>
        <span class="vi-txt">SPEAKING</span>
      </div>

      <!-- Caption Bar -->
      <div class="caption-bar" id="caption-bar"></div>

      <!-- Performance Overlay -->
      <div class="perf" id="perf">
        <div class="perf-hdr">
          <div class="perf-lbl" id="perf-lbl">ON STAGE</div>
          <button class="perf-close" onclick="closePerf()">✕</button>
        </div>
        <div class="perf-txt" id="perf-txt"></div>
        <div class="perf-act" id="perf-act"></div>
      </div>
    </div>

    <!-- CONTROL PANEL -->
    <div class="panel">

      <!-- Platform Tabs -->
      <div class="ptabs">
        <div class="ptab pt-ig on" id="tab-ig" onclick="swPlat('ig')">
          <span class="ico">📸</span>Instagram
        </div>
        <div class="ptab pt-tt" id="tab-tt" onclick="swPlat('tt')">
          <span class="ico">🎵</span>TikTok
        </div>
        <div class="ptab pt-yt" id="tab-yt" onclick="swPlat('yt')">
          <span class="ico">🎥</span>YouTube
        </div>
        <div class="ptab pt-li" id="tab-li" onclick="swPlat('li')">
          <span class="ico">💼</span>LinkedIn
        </div>
      </div>

      <!-- Content Type Pills -->
      <div class="tbar">
        <div class="tpill on" id="tp-caption" onclick="swType('caption')">Caption & Hook</div>
        <div class="tpill" id="tp-script" onclick="swType('script')">Act It Out 🎬</div>
        <div class="tpill" id="tp-hashtags" onclick="swType('hashtags')">Hashtags</div>
        <div class="tpill" id="tp-schedule" onclick="swType('schedule')">Schedule</div>
        <div class="tpill" id="tp-ideas" onclick="swType('ideas')">Ideas</div>
      </div>

      <!-- Brief Input -->
      <div class="bbar">
        <div class="blbl">BRIEF</div>
        <input class="binp" id="binp" placeholder="Your brand, niche or topic..."/>
        <div class="btn-row">
          <button class="abtn" id="abtn" onclick="go()">ACTION ↗</button>
          <button class="vbtn" id="vbtn" onclick="toggleVoice()" title="Toggle voice">🔊</button>
        </div>
      </div>

      <!-- Output -->
      <div class="out" id="out">
        <div class="empty">👆 Pick a platform, content type, write your brief — hit ACTION.</div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
