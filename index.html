<!DOCTYPE html>
<html>

<head>

<title>ImpactGrid Creator Studio</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}


/* HEADER */

h1{
margin-bottom:10px;
}

p{
opacity:0.8;
}


/* INPUT AREA */

input{
padding:12px;
width:260px;
border-radius:6px;
border:none;
margin-right:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
background:#00c2ff;
color:white;
font-weight:bold;
}

button:hover{
background:#0099cc;
}


/* STUDIO */

#studio{
margin-top:40px;
display:flex;
flex-direction:column;
align-items:center;
}


/* VERTICAL VIDEO FRAME */

#videoFrame{
width:320px;
height:560px;
background:#000;
border-radius:16px;
overflow:hidden;
position:relative;
box-shadow:0 0 25px rgba(0,0,0,0.7);
}


/* ROOM BACKGROUND */

#room{
width:100%;
height:100%;
background:#333;
background-size:cover;
background-position:center;
position:relative;
}


/* AVATAR */

#agentAvatar{
width:160px;
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
}


/* CAPTIONS */

.caption{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
width:85%;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
font-size:16px;
}


/* INFO PANEL */

#output{
margin-top:30px;
max-width:500px;
}

</style>

</head>

<body>

<h1>ImpactGrid Creator Studio</h1>

<p>Create AI content with DIJO agents</p>


<input id="topic" placeholder="Enter topic">

<button onclick="generate()">Generate</button>


<div id="studio">


<div id="videoFrame">

<div id="room">

<img id="agentAvatar" src="">

</div>

</div>


<div id="output"></div>


</div>


<script src="script.js"></script>

</body>

</html>
